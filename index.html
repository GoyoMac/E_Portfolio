const s = document.createElement('script');
s.src = "https://unpkg.com/@babel/standalone@7.25.6/babel.min.js";
s.onload = () => {
  const source = document.getElementById('app-source').textContent;

  root.render(React.createElement(Portfolio));
};
document.head.appendChild(s);

// ====== Background: Matrix Rain (canvas) =====================
function MatrixRain() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const chars = "01ABCDEF{}[]<>/$#@*!?+=-_アイウエオカキクケコサシスセソタチツテト";
    let cols, drops, fontSize;
    const resize = () => {
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      fontSize = 14 * dpr;
      cols = Math.floor(canvas.width / fontSize);
      drops = Array.from({ length: cols }, () => Math.random() * -100);
    };
    resize();
    window.addEventListener("resize", resize);
    let last = 0;
    const fps = 24;
    const interval = 1000 / fps;
    const tick = (t) => {
      raf = requestAnimationFrame(tick);
      if (t - last < interval) return;
      last = t;
      ctx.fillStyle = "rgba(5, 8, 19, 0.08)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = `${fontSize}px "JetBrains Mono", monospace`;
      for (let i = 0; i < cols; i++) {
        const ch = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;
        const gradient = Math.random();
        ctx.fillStyle = gradient > 0.985
          ? "rgba(0, 240, 255, 0.85)"
          : gradient > 0.95
          ? "rgba(52, 255, 139, 0.55)"
          : "rgba(52, 255, 139, 0.28)";
        ctx.fillText(ch, x, y);
        if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    };
    raf = requestAnimationFrame(tick);
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
    };
  }, []);
  return (
    <canvas
      ref={canvasRef}
      className="fixed inset-0 w-full h-full pointer-events-none"
      style={{ zIndex: 0, opacity: 0.35 }}
      aria-hidden="true"
    />
  );
}

// ====== Typing animation hook ================================
function useTypewriter(words, speed = 70, pause = 1500) {
  const [text, setText] = useState("");
  const [i, setI] = useState(0);
  const [del, setDel] = useState(false);
  useEffect(() => {
    const current = words[i % words.length];
    let timeout;
    if (!del && text === current) {
      timeout = setTimeout(() => setDel(true), pause);
    } else if (del && text === "") {
      setDel(false);
      setI((p) => p + 1);
    } else {
      timeout = setTimeout(() => {
        setText((prev) =>
          del ? current.substring(0, prev.length - 1) : current.substring(0, prev.length + 1)
        );
      }, del ? speed / 2 : speed);
    }
    return () => clearTimeout(timeout);
  }, [text, del, i, words, speed, pause]);
  return text;
}

// ====== Main app =============================================
function Portfolio() {
  const [active, setActive] = useState("home");

  // Scroll spy
  useEffect(() => {
    const sections = NAV_LINKS.map((l) => document.getElementById(l.id)).filter(Boolean);
    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) setActive(e.target.id);
        });
      },
      { rootMargin: "-40% 0px -55% 0px" }
    );
    sections.forEach((s) => obs.observe(s));
    return () => obs.disconnect();
  }, []);

  const onJump = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  return (
    <div className="min-h-screen bg-[#050813] text-white relative overflow-x-hidden font-body">
      {/* Inline fonts + globals */}
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');
        .font-display { font-family: 'Orbitron', 'Space Grotesk', system-ui, sans-serif; letter-spacing: -0.01em; }
        .font-body { font-family: 'Outfit', system-ui, sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
        html { scroll-behavior: smooth; }
        ::selection { background: rgba(0,240,255,0.35); color: #fff; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #050813; }
        ::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.25); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,240,255,0.5); }
      `}</style>

      <MatrixRain />
      <Atmosphere />
      <ScanLines />

      <div className="relative" style={{ zIndex: 2 }}>
        <Navbar active={active} onJump={onJump} />
        <main>
          <Hero onJump={onJump} />
          <Education />
          <Skills />
          <Certifications />
          <Contact />
        </main>
        <Footer />
      </div>
    </div>
  );
}
